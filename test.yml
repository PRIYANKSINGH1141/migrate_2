name: gha-migration/rush_1
on:
  push:
  workflow_dispatch:
concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true
jobs:
  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_NAME: demo-app
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 20
        lfs: true
    - uses: actions/download-artifact@v4.1.0
      with:
        name: build
        path: .
  
    - run: echo "Reading artifact from build stage..."
    - run: cat build.txt
    - run: echo "Running Tests..."
    - run: echo "Tests Passed" > test.txt
    - run: cat test.txt
    - uses: actions/upload-artifact@v4.1.0
      if: success()
      with:
        name: "${{ github.job }}"
        retention-days: 1
        path: test.txt
