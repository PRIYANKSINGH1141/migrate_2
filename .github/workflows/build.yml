name: gha-migration/rush_1

on:
  workflow_call:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:22.04

    timeout-minutes: 60

    env:
      APP_NAME: demo-app

    steps:
      - name: Install Git and Git LFS
        run: |
          apt-get update
          apt-get install -y git git-lfs
          git lfs install

      - uses: actions/checkout@v4.1.0
        with:
          fetch-depth: 20
          lfs: true

      - run: echo "Building $APP_NAME..."

      - run: echo "Docker Image Build Successful" > build.txt

      - run: cat build.txt

      - uses: actions/upload-artifact@v4.1.0
        if: success()
        with:
          name: ${{ github.job }}
          retention-days: 1
          path: build.txt
